trigger: none

pool:
  vmImage: ubuntu-latest

steps:
- task: AzureCLI@2
  displayName: 'Login with Managed Identity'
  inputs:
    azureSubscription: sc-bct-prod-mi   # ← Service Connection 名
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      echo "Logged in to Azure"
      az account show